<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Dzimšanas diena</title>
</head>
<body>

<h1>Cik dienas līdz dzimšanas dienai?</h1>
<hr>

<form>
    <p>Ievadi savu dzimšanas dienu:</p>

    Mēnesis: <input type="text" name="menesis"><br><br>
    Diena: <input type="text" name="datums"><br><br>

    <input type="button" value="Aprēķināt dienas" onclick="dienas();"><br><br>

    Līdz svētkiem atlikušas <input type="text" name="dienas" readonly> dienas
</form>

<script>
function dienas() {
    let menesis = parseInt(document.getElementsByName("menesis")[0].value);
    let datums = parseInt(document.getElementsByName("datums")[0].value);

    if (isNaN(menesis) || isNaN(datums)) {
        alert("Lūdzu, ievadi pareizus skaitļus!");
        return;
    }

    let today = new Date();
    let currentYear = today.getFullYear();

    let birthday = new Date(currentYear, menesis - 1, datums);

    // Ja dzimšanas diena jau pagājusi šogad
    if (birthday < today) {
        birthday.setFullYear(currentYear + 1);
    }

    let diff = birthday - today;
    let dienasAtlikusas = Math.ceil(diff / (1000 * 60 * 60 * 24));

    document.getElementsByName("dienas")[0].value = dienasAtlikusas;
}
</script>

</body>
</html>
