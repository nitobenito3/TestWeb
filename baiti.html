<!DOCTYPE html>
<html lang="en">
<head>
<title>CSS Template</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* Style the header */
header {
  background-color: #666;
  padding: 30px;
  text-align: center;
  font-size: 35px;
  color: white;
}

/* Container for flexboxes */
section {
  display: -webkit-flex;
  display: flex;
}

/* Style the navigation menu */
nav {
  -webkit-flex: 1;
  -ms-flex: 1;
  flex: 1;
  background: #ccc;
  padding: 20px;
}

/* Style the list inside the menu */
nav ul {
  list-style-type: none;
  padding: 0;
}

/* Style the content */
article {
  -webkit-flex: 3;
  -ms-flex: 3;
  flex: 3;
  background-color: #f1f1f1;
  padding: 10px;
}

/* Style the footer */
footer {
  background-color: #777;
  padding: 10px;
  text-align: center;
  color: white;
}

/* Responsive layout - makes the menu and the content (inside the section) sit on top of each other instead of next to each other */
@media (max-width: 600px) {
  section {
    -webkit-flex-direction: column;
    flex-direction: column;
  }
}
</style>
 <title>Baiti</title>
    <script>
        function aprekinat(vieniba) {
            let sekundes = document.getElementById("sekundes").value;

            if (sekundes === "" || sekundes <= 0) {
                document.getElementById("rezultats").innerHTML = "Ievadiet derīgu sekunžu skaitu!";
                return;
            }

            // Pieņemsim, ka ātrums = 1024 baiti sekundē
            let baiti = sekundes * 1024;

            let rezultats;

            if (vieniba === "KiB") {
                rezultats = baiti / 1024; // 1 KiB = 1024 B
                document.getElementById("rezultats").innerHTML =
                    "Lejupielādētais daudzums: " + rezultats + " KiB";
            } else if (vieniba === "KB") {
                rezultats = baiti / 1000; // 1 KB = 1000 B
                document.getElementById("rezultats").innerHTML =
                    "Lejupielādētais daudzums: " + rezultats + " KB";
            }
        }

        function resetForma() {
            document.getElementById("forma").reset();
            document.getElementById("rezultats").innerHTML = "";
        }
    </script>

<h2>Lejupielādes aprēķins</h2>

<form id="forma">
    <label>Ievadiet sekunžu skaitu:</label><br>
    <input type="number" id="sekundes" onfocus="resetForma()"><br><br>

    <label>Izvēlieties mērvienību:</label><br>

    <input type="radio" name="vieniba" onclick="aprekinat('KiB')">
    KiB<br>

    <input type="radio" name="vieniba" onclick="aprekinat('KB')">
    KB<br><br>

    <p id="rezultats"></p>
</form>

</body>
</html>
